  tc.fillStyle='rgba(100,180,255,.7)';tc.shadowColor='rgba(0,0,0,.2)';tc.shadowBlur=4;
  tc.beginPath();tc.roundRect(0,0,16,38,8);tc.fill();tc.shadowBlur=0;
  tc.fillStyle='rgba(255,255,255,.3)';tc.beginPath();tc.roundRect(3,5,5,14,3);tc.fill();
  tc.fillStyle='#555';tc.beginPath();tc.roundRect(-1,-5,18,8,4);tc.fill();
  tc.restore();
}

function drawTentKid(){
  tc.save();
  const s=55;
  let drawX=kidX, drawY=kidY;
  const isMoving=kidMoving;
  const anim=isMoving?tentAnimT:0;
  const leg=Math.sin(anim*8)*s*.2;

  if(kidState==='inbed'){
    // Lying down on mattress
    tc.translate(tc_W*.28,tc_H*.62);
    tc.rotate(-.05);
    // body horizontal
    tc.fillStyle='#eeeef0';
    tc.beginPath();tc.roundRect(-s*1.6,-s*.28,s*3.2,s*.6,s*.2);tc.fill();
    // head
    tc.fillStyle='#f5c5a0';tc.beginPath();tc.arc(-s*1.8,0,s*.45,0,Math.PI*2);tc.fill();
    tc.fillStyle='#1c1108';tc.beginPath();tc.ellipse(-s*1.8,-s*.2,s*.45,s*.22,0,0,Math.PI*2);tc.fill();
    // sleepy eyes
    tc.strokeStyle='#1a1a1a';tc.lineWidth=s*.06;
    tc.beginPath();tc.moveTo(-s*2.0,0);tc.lineTo(-s*1.72,0);tc.stroke();
    tc.beginPath();tc.moveTo(-s*1.62,0);tc.lineTo(-s*1.35,0);tc.stroke();
  } else if(kidState==='inchair'){
    // Sitting in chair
    tc.translate(tc_W*.72,tc_H*.59);
    // legs hanging
    tc.fillStyle='#1a1a1a';
    tc.fillRect(-s*.28,s*.05,s*.22,s*.55);tc.fillRect(s*.06,s*.05,s*.22,s*.55);
    // body
    tc.fillStyle='#eeeef0';tc.beginPath();tc.roundRect(-s*.38,-s*.25,s*.76,s*.35,s*.1);tc.fill();
    // head
    tc.fillStyle='#f5c5a0';tc.beginPath();tc.ellipse(0,-s*.55,s*.34,s*.36,0,0,Math.PI*2);tc.fill();
    tc.fillStyle='#1c1108';tc.beginPath();
    tc.moveTo(-s*.38,-s*.75);tc.quadraticCurveTo(-s*.06,-s*.62,tc_W*.0,-s*.58);
    tc.quadraticCurveTo(s*.22,-s*.62,s*.36,-s*.75);
    tc.quadraticCurveTo(s*.38,-s*.55,s*.36,-s*.45);tc.lineTo(-s*.36,-s*.45);
    tc.quadraticCurveTo(-s*.38,-s*.55,-s*.38,-s*.75);tc.closePath();tc.fill();
    // happy eyes
    tc.strokeStyle='#1a1a1a';tc.lineWidth=s*.07;tc.lineCap='round';
    tc.beginPath();tc.arc(-s*.13,-s*.55,s*.08,Math.PI*.1,Math.PI*.9);tc.stroke();
    tc.beginPath();tc.arc(s*.13,-s*.55,s*.08,Math.PI*.1,Math.PI*.9);tc.stroke();
    // smile
    tc.strokeStyle='#c07858';tc.lineWidth=s*.06;
    tc.beginPath();tc.arc(0,-s*.4,s*.1,.2,Math.PI-.2);tc.stroke();
  } else {
    // Walking/standing
    tc.translate(drawX,drawY);
    tc.fillStyle='rgba(0,0,0,.15)';tc.beginPath();tc.ellipse(0,s*.92,s*.5,s*.15,0,0,Math.PI*2);tc.fill();
    tc.fillStyle='#1a1a1a';
    tc.fillRect(-s*.26,s*.3-leg,s*.22,s*.44);tc.fillRect(s*.04,s*.3+leg,s*.22,s*.44);
    tc.fillStyle='#c0c0c0';
    tc.beginPath();tc.ellipse(-s*.16,s*.76-leg,s*.2,s*.09,-.1,0,Math.PI*2);tc.fill();
    tc.beginPath();tc.ellipse(s*.16,s*.76+leg,s*.2,s*.09,.1,0,Math.PI*2);tc.fill();
    tc.fillStyle='#eeeef0';tc.beginPath();tc.roundRect(-s*.36,-.05*s,s*.72,s*.4,s*.1);tc.fill();
    tc.fillStyle='#eeeef0';
    tc.fillRect(-s*.58,-s*.05+leg*.4,s*.24,s*.3);tc.fillRect(s*.34,-s*.05-leg*.4,s*.24,s*.3);
    tc.fillStyle='#f5c5a0';tc.beginPath();tc.ellipse(0,-s*.44,s*.32,s*.36,0,0,Math.PI*2);tc.fill();
    // hair
    tc.fillStyle='#1c1108';
    tc.beginPath();tc.moveTo(-s*.34,-s*.7);tc.quadraticCurveTo(-s*.06,-s*.82,s*.0,-s*.8);
    tc.quadraticCurveTo(s*.2,-s*.82,s*.34,-s*.7);tc.quadraticCurveTo(s*.36,-s*.5,s*.34,-s*.42);
    tc.lineTo(-s*.34,-s*.42);tc.quadraticCurveTo(-s*.36,-s*.5,-s*.34,-s*.7);tc.closePath();tc.fill();
    tc.fillStyle='#1a1a1a';
    tc.beginPath();tc.ellipse(-s*.12,-s*.46,s*.08,s*.055,0,0,Math.PI*2);tc.fill();
    tc.beginPath();tc.ellipse(s*.12,-s*.46,s*.08,s*.055,0,0,Math.PI*2);tc.fill();
    tc.strokeStyle='#c07858';tc.lineWidth=s*.05;
    tc.beginPath();tc.arc(0,-s*.34,s*.09,.2,Math.PI-.2);tc.stroke();
  }
  tc.restore();
}

function tentLoop(){
  if(!tentOverlayOpen) return;
  drawTentOverlay();
  requestAnimationFrame(tentLoop);
}

// Tent click interaction
function tentClick(ex,ey){
  const rect=tc_el.getBoundingClientRect();
  const px=(ex-rect.left)*(tc_W/rect.width);
  const py=(ey-rect.top)*(tc_H/rect.height);

  // Wake up / stand up button
  if(py>tc_H*.85&&px>tc_W/2-60&&px<tc_W/2+60){
    if(kidState==='inbed'||kidState==='inchair'){
      kidState='standing'; kidX=tc_W*.5; kidY=tc_H*.82;
      tentMsg='Click bed or chair!';tentMsgTimer=90;
      return;
    }
  }

  if(kidState==='inbed'||kidState==='inchair') return;

  // Check clickables
  for(const c of tentClickables){
    if(px>=c.x&&px<=c.x+c.w&&py>=c.y&&py<=c.y+c.h){
      kidTargetX=c.x+c.w/2; kidTargetY=c.y+c.h*.8;
      kidMoving=true; kidState='walking';
      tentMsg=`Walking to ${c.label}...`;tentMsgTimer=60;
      return;
    }
  }

  // Click to walk there
  kidTargetX=px; kidTargetY=Math.min(py,tc_H*.88);
  kidMoving=true; kidState='walking';
}

tc_el=document.getElementById('tent-canvas');
tc_el.addEventListener('click',e=>tentClick(e.clientX,e.clientY));
tc_el.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];tentClick(t.clientX,t.clientY);},{passive:false});

// ── HOOK ALL PROXIMITY CHECKS INTO MAIN LOOP ─────────────
const _origLoopGrillCheck=loop;
loop=function(ts){
  _origLoopGrillCheck(ts);
  if(gstate==='playing'){
    checkCoolerProximity();
    checkTentProximity();
  }
};

// ── KEYBOARD SHORTCUTS ────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='c'||e.key==='C'){if(nearbyCooler&&!coolerOverlayOpen)openCoolerOverlay();}
  if(e.key==='t'||e.key==='T'){if(nearbyTent&&!tentOverlayOpen)openTentOverlay();}
  if(e.key==='Escape'){
    if(coolerOverlayOpen)closeCoolerOverlay();
    if(tentOverlayOpen)closeTentOverlay();
  }
});

initMap();
requestAnimationFrame(loop);
</script>
